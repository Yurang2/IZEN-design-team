name = "izen-design-api"
main = "src/index.ts"
compatibility_date = "2026-02-23"
workers_dev = true
keep_vars = true

[observability]
enabled = true

# Optional: local/dev TTL override (seconds)
[vars]
API_CACHE_TTL_SECONDS = "60"
NOTION_CHECKLIST_ASSIGNMENT_DB_ID = "311c1cc7ec2780998a4cd2d38e44cc7a"
NOTION_EVENT_GRAPHICS_TIMETABLE_DB_ID = "321c1cc7ec278044b752d1b813b95559"
NOTION_SCREENING_HISTORY_DB_ID = "325c1cc7ec2780ecaca5ff2bd6d81428"
# NOTION_SCREENING_PLAN_DB_ID = "replace-with-notion-plan-db-id"
NOTION_SCREENING_VIDEO_DB_ID = "325c1cc7ec2780ecaca5ff2bd6d81428"
# Temporary toggle: disable password/session auth gate.
AUTH_DISABLED = "true"
# PAGE_PASSWORD is required. Prefer setting it as a secret:
# npx wrangler secret put PAGE_PASSWORD --config worker/wrangler.toml
# PAGE_PASSWORD = "izenjsk_62988"
#
# Optional signing key for session cookie (defaults to PAGE_PASSWORD):
# npx wrangler secret put SESSION_SECRET --config worker/wrangler.toml
# SESSION_TTL_SECONDS = "43200"
#
# Optional API key for server-to-server calls (not required for page login):
# npx wrangler secret put API_KEY --config worker/wrangler.toml
# Comma-separated origins for browser access (exact + optional wildcard subdomain with *.)
# Example: "http://localhost:5173,https://izen-design-team.pages.dev,https://*.izen-design-team.pages.dev"
# ALLOWED_ORIGINS = "http://localhost:5173"

# Basic burst protection (best effort, in-memory per isolate).
RATE_LIMIT_WINDOW_SECONDS = "10"
RATE_LIMIT_MAX_REQUESTS = "180"
RATE_LIMIT_BLOCK_SECONDS = "30"
MEETING_KEYWORD_LIMIT = "120"
MEETING_AUDIO_BUCKET_NAME = "izen-meeting-audio"
# Optional: override default webhook callback target
# ASSEMBLYAI_WEBHOOK_URL = "https://your-domain/api/assemblyai/webhook"
# Optional: speech model routing list (comma-separated, default: universal-2)
# ASSEMBLYAI_SPEECH_MODELS = "universal-2"
# Required for R2 presigned upload/download signing:
# R2_ACCOUNT_ID = "your-cloudflare-account-id"
# Set as secrets:
# npx wrangler secret put R2_ACCESS_KEY_ID --config worker/wrangler.toml
# npx wrangler secret put R2_SECRET_ACCESS_KEY --config worker/wrangler.toml
# Optional: GPT summary (used on POST /api/transcripts/:id/publish)
# Set as secret:
# npx wrangler secret put OPENAI_API_KEY --config worker/wrangler.toml
# Optional model override (default: gpt-5-mini)
# OPENAI_SUMMARY_MODEL = "gpt-5-mini"
#
# LINE reminder secrets:
# npx wrangler secret put LINE_CHANNEL_ACCESS_TOKEN --config worker/wrangler.toml
# npx wrangler secret put LINE_CHANNEL_SECRET --config worker/wrangler.toml
# npx wrangler secret put LINE_NOTIFY_TARGET_USER_ID --config worker/wrangler.toml
# Optional override (default: 조정훈)
# LINE_NOTIFY_ASSIGNEE_NAME = "조정훈"

# Optional Cloudflare Access gate on top of session/API-key auth.
REQUIRE_CF_ACCESS = "false"
# ALLOWED_ACCESS_EMAILS = "user1@company.com,user2@company.com"

# D1 binding is appended at runtime by `scripts/run-worker.sh` when:
# - CHECKLIST_DB_ID is set
# - CHECKLIST_DB_NAME (optional, default: izen-design-checklist)

[[r2_buckets]]
binding = "MEETING_AUDIO_BUCKET"
bucket_name = "izen-meeting-audio"

[triggers]
crons = ["0 0 * * *", "30 8 * * *", "*/30 * * * *"]
