name = "izen-design-api"
main = "src/index.ts"
compatibility_date = "2026-02-23"
workers_dev = true

[observability]
enabled = true

# Optional: local/dev TTL override (seconds)
[vars]
API_CACHE_TTL_SECONDS = "60"
# API_KEY is required. Prefer setting it as a secret:
# npx wrangler secret put API_KEY --config worker/wrangler.toml
# API_KEY = "izenjsk_62988"
# Comma-separated exact origins for browser access.
# Example: "http://localhost:5173,https://izen-design-team.pages.dev"
# ALLOWED_ORIGINS = "http://localhost:5173"

# Basic burst protection (best effort, in-memory per isolate).
RATE_LIMIT_WINDOW_SECONDS = "10"
RATE_LIMIT_MAX_REQUESTS = "180"
RATE_LIMIT_BLOCK_SECONDS = "30"

# Optional Cloudflare Access gate on top of API key auth.
REQUIRE_CF_ACCESS = "false"
# ALLOWED_ACCESS_EMAILS = "user1@company.com,user2@company.com"

# D1 binding is appended at runtime by `scripts/run-worker.sh` when:
# - CHECKLIST_DB_ID is set
# - CHECKLIST_DB_NAME (optional, default: izen-design-checklist)
