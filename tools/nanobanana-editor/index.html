<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nano Banana Local Editor</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="toolbar" aria-label="편집 설정">
        <div>
          <p class="eyebrow">Vertex AI Gemini Image</p>
          <h1>Nano Banana 로컬 영역 변형</h1>
        </div>

        <label id="sourceDropTarget" class="fileButton dropTarget">
          <input id="fileInput" type="file" accept="image/*" multiple />
          이미지 열기
        </label>

        <label id="referenceDropTarget" class="fileButton secondaryFile dropTarget">
          <input id="referenceInput" type="file" accept="image/*" multiple />
          참조 이미지 추가
        </label>

        <div id="referenceStrip" class="referenceStrip" aria-label="참조 이미지"></div>

        <div class="credentialBox">
          <label class="fileButton secondaryFile">
            <input id="credentialFileInput" type="file" accept=".json,application/json" />
            Vertex JSON 선택
          </label>
          <textarea id="credentialInput" class="hiddenField" rows="1" spellcheck="false"></textarea>
          <input id="projectInput" class="hiddenField" type="text" />
          <input id="locationInput" class="hiddenField" type="text" value="us-central1" />
        </div>

        <label>
          모델
          <select id="modelInput">
            <option value="gemini-3.1-flash-image-preview">Nano Banana 2 / Gemini 3.1 Flash Image Preview</option>
            <option value="gemini-3-pro-image-preview">Gemini 3 Pro Image Preview</option>
            <option value="gemini-2.5-flash-image">Nano Banana / Gemini 2.5 Flash Image</option>
          </select>
        </label>

        <div class="segmented" aria-label="선택 도구">
          <button id="brushTool" type="button" class="active">브러시</button>
          <button id="eraseTool" type="button">지우개</button>
          <button id="rectTool" type="button">박스</button>
        </div>

        <label>
          브러시 <span id="brushValue">72</span>px
          <input id="brushInput" type="range" min="16" max="180" step="4" value="72" />
        </label>

        <label>
          경계 <span id="featherValue">8</span>px
          <input id="featherInput" type="range" min="0" max="28" step="1" value="8" />
        </label>

        <label class="promptBox">
          변형 프롬프트
          <textarea id="promptInput" rows="5">선택한 영역을 무광 크롬 재질의 제품 표면처럼 자연스럽게 바꿔줘</textarea>
        </label>

        <div class="actions">
          <button id="runButton" type="button">선택 이미지 변형</button>
          <button id="runAllButton" type="button">대기 이미지 모두 변형</button>
          <button id="previewToggleButton" type="button" class="secondary" disabled>편집본 보기</button>
          <a id="selectedDownloadLink" class="download disabled" download="nanobanana-selected-edit.png">선택 저장</a>
          <button id="selectAllButton" type="button" class="secondary">전체 선택</button>
          <button id="clearButton" type="button" class="secondary">선택 지우기</button>
        </div>

        <p id="statusText" class="status">이미지를 열고 변형할 부분을 칠하세요.</p>
      </section>

      <section class="workspace" aria-label="이미지 편집">
        <div id="canvasStage" class="canvasStage empty">
          <div class="emptyText">이미지를 열면 캔버스가 표시됩니다.</div>
          <img id="sourceImage" alt="원본 이미지" draggable="false" />
          <img id="previewImage" alt="결과 미리보기" draggable="false" />
          <canvas id="maskCanvas" aria-label="변형할 부분 선택"></canvas>
          <canvas id="draftCanvas" aria-label="선택 미리보기"></canvas>
          <div id="previewBadge" class="previewBadge">기존본 표시중</div>
        </div>

        <aside class="resultPanel" aria-label="이미지 목록과 결과">
          <div class="resultHead">
            <div>
              <p class="eyebrow">Queue</p>
              <strong id="resultMeta">아직 이미지 없음</strong>
            </div>
          </div>
          <div id="itemGrid" class="itemGrid"></div>
        </aside>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
